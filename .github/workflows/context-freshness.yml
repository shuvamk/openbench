# Fails PRs that change architecture-relevant product code without a .context/ update.
name: Context freshness
on:
  pull_request:
jobs:
  context-freshness:
    name: context-freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node .github/scripts/context-freshness.mjs
